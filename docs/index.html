<!DOCTYPE html>
<html>
<head>
    <style type="text/css">
        body, html
        {
            height: 100%;
            margin: 0;
        }

        .bgimg
        {
            background-image: url('images/animals/business-pug-working-on-laptop.jpg');
            height: 100%;
            background-position: center center;
            background-size: 70%;
            background-repeat: no-repeat;
            position: relative;
            font-family: "Courier New", Courier, monospace;
            font-size: 25px;
        }

        .middle
        {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        hr
        {
            margin: auto;
            width: 40%;
        }
    </style>
</head>

<body>

    <div class="bgimg">
        <div class="middle">
            <h1>COMING SOON</h1>
            <hr>
        </div>
    </div>

</body>
</html>
